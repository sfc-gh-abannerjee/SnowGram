<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake Architecture Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  /* ────────────────────────── Tokens ────────────────────────── */
  :root {
    --sf-blue: #29B5E8;
    --sf-mid-blue: #11567F;
    --sf-iceberg: #003545;
    --sf-winter: #24323D;
    --sf-star-blue: #71D3DC;
    --sf-orange: #FF9F36;
    --sf-windy: #8A999E;
    --sf-midnight: #000000;

    --surface: #FFFFFF;
    --surface-soft: #F4F7FA;
    --page-bg: #F4F7FA;
    --text-primary: #1A2332;
    --text-secondary: #5A6A7A;
    --text-muted: #8A999E;
    --border-subtle: rgba(0,53,69,0.08);
    --shadow-card: 0 1px 2px rgba(0,53,69,0.05), 0 4px 16px rgba(0,53,69,0.06);
    --connector-color: #8A999E;

    --node-onprem-bg:     rgba(255,159,54,0.06);
    --node-onprem-border: rgba(255,159,54,0.22);
    --node-onprem-icon-bg:     rgba(255,159,54,0.12);
    --node-onprem-icon-border: rgba(255,159,54,0.30);

    --node-bridge-bg:     rgba(17,86,127,0.05);
    --node-bridge-border: rgba(17,86,127,0.18);
    --node-bridge-icon-bg:     rgba(17,86,127,0.10);
    --node-bridge-icon-border: rgba(17,86,127,0.22);

    --node-snow-bg:     rgba(41,181,232,0.06);
    --node-snow-border: rgba(41,181,232,0.20);
    --node-snow-icon-bg:     rgba(41,181,232,0.12);
    --node-snow-icon-border: rgba(41,181,232,0.26);

    --node-outcome-bg:     rgba(113,211,220,0.07);
    --node-outcome-border: rgba(113,211,220,0.24);
    --node-outcome-icon-bg:     rgba(113,211,220,0.16);
    --node-outcome-icon-border: rgba(113,211,220,0.32);

    --radius-card: 12px;
    --radius-node: 10px;
    --radius-badge: 6px;
  }

  [data-theme="dark"] {
    --surface: #1B252E;
    --surface-soft: #243140;
    --page-bg: #0F1820;
    --text-primary: #E8EEF4;
    --text-secondary: #9DB0C0;
    --text-muted: #6F7E8E;
    --border-subtle: rgba(255,255,255,0.08);
    --shadow-card: 0 1px 2px rgba(0,0,0,0.40), 0 6px 22px rgba(0,0,0,0.30);
    --connector-color: #7BA0B0;

    --node-onprem-bg:     rgba(255,159,54,0.10);
    --node-onprem-border: rgba(255,159,54,0.30);
    --node-onprem-icon-bg:     rgba(255,159,54,0.18);
    --node-onprem-icon-border: rgba(255,159,54,0.40);

    --node-bridge-bg:     rgba(41,181,232,0.10);
    --node-bridge-border: rgba(41,181,232,0.32);
    --node-bridge-icon-bg:     rgba(41,181,232,0.18);
    --node-bridge-icon-border: rgba(41,181,232,0.40);

    --node-snow-bg:     rgba(41,181,232,0.10);
    --node-snow-border: rgba(41,181,232,0.30);
    --node-snow-icon-bg:     rgba(41,181,232,0.20);
    --node-snow-icon-border: rgba(41,181,232,0.45);

    --node-outcome-bg:     rgba(113,211,220,0.12);
    --node-outcome-border: rgba(113,211,220,0.34);
    --node-outcome-icon-bg:     rgba(113,211,220,0.22);
    --node-outcome-icon-border: rgba(113,211,220,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--page-bg);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  /* ────────────────────────── Header band ────────────────────────── */
  .header-band {
    background: linear-gradient(135deg, var(--sf-iceberg) 0%, var(--sf-mid-blue) 60%, var(--sf-blue) 100%);
    padding: 36px 32px 32px;
    position: relative;
    overflow: hidden;
  }
  .header-band::after {
    content: "";
    position: absolute;
    top: -40%; right: -5%;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(41,181,232,0.18) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .header-inner {
    max-width: 1920px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-text { min-width: 280px; }
  .header-text h1 {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #FFFFFF;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .header-text .sub {
    font-size: 12px;
    color: var(--sf-star-blue);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .header-actions button {
    background: rgba(255,255,255,0.10);
    color: #FFFFFF;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 8px 14px;
    border-radius: var(--radius-badge);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s ease;
  }
  .header-actions button:hover { background: rgba(255,255,255,0.20); }

  .theme-toggle {
    width: 36px;
    height: 36px;
    padding: 0 !important;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .moon { display: inline; }
  .theme-toggle .sun  { display: none; }
  [data-theme="dark"] .theme-toggle .moon { display: none; }
  [data-theme="dark"] .theme-toggle .sun  { display: inline; }

  /* ────────────────────────── Page ────────────────────────── */
  .page {
    max-width: 1920px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* ────────────────────────── Legend ────────────────────────── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-onprem  { background: var(--sf-orange); }
  .dot-bridge  { background: var(--sf-mid-blue); }
  .dot-snow    { background: var(--sf-blue); }
  .dot-outcome { background: var(--sf-star-blue); }

  /* ────────────────────────── Diagram card ────────────────────────── */
  .diagram-card {
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border-subtle);
    padding: 32px 28px;
    margin-bottom: 20px;
    position: relative;
    transition: background-color 0.25s ease, border-color 0.25s ease;
  }

  /* ────────────────────────── SVG connector overlay ────────────────────────── */
  .connector-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
    overflow: visible;
  }
  .connector-path {
    fill: none;
    stroke: var(--connector-color);
    stroke-width: 1.3;
    stroke-dasharray: 5 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.7;
    animation: connector-flow 1.2s linear infinite;
    transition: stroke-width 120ms ease, opacity 120ms ease, stroke 120ms ease;
    pointer-events: stroke;
    cursor: pointer;
  }
  /* Wider invisible hit area paired with each visible connector for
     easy hover targeting (dashed thin strokes are otherwise hard to hit). */
  .connector-hit {
    fill: none;
    stroke: transparent;
    stroke-width: 14;
    pointer-events: stroke;
    cursor: pointer;
  }
  /* Hovering anywhere within the group (hit area or visible path)
     highlights the visible connector. */
  .connector-group:hover .connector-path,
  .connector-group.is-active .connector-path {
    stroke: var(--accent, #6cb9ff);
    stroke-width: 2.4;
    opacity: 1;
    stroke-dasharray: none;
    animation: none;
  }
  /* Highlighted source/target nodes when their connector is hovered
     (or when the user hovers the node itself). */
  .flow-node.is-active {
    box-shadow: 0 0 0 2px var(--accent, #6cb9ff), 0 0 18px rgba(108, 185, 255, 0.45);
    border-color: var(--accent, #6cb9ff);
    transition: box-shadow 120ms ease, border-color 120ms ease;
    cursor: pointer;
  }
  .flow-node {
    transition: box-shadow 120ms ease, border-color 120ms ease;
  }
  .connector-dot {
    fill: var(--connector-color);
    opacity: 0.8;
  }
  @keyframes connector-flow { to { stroke-dashoffset: -20; } }

  /* ────────────────────────── Topology-driven multi-column layout ────────────────────────── */
  .arch-layout {
    display: grid;
    gap: 48px;
    align-items: start;
    position: relative;
  }
  @media (max-width: 900px) {
    .arch-layout { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)) !important; }
  }
  @media (max-width: 600px) {
    .arch-layout { grid-template-columns: 1fr !important; }
  }

  .rank-column {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 0;
  }
  .rank-column .rank-label {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .platform-boundary {
    border: 2px dashed var(--sf-blue);
    border-radius: 16px;
    padding: 28px 24px 24px;
    position: relative;
    background: rgba(41,181,232,0.015);
  }
  [data-theme="dark"] .platform-boundary {
    background: rgba(41,181,232,0.03);
  }
  .platform-label {
    position: absolute;
    top: -11px;
    left: 24px;
    background: var(--surface);
    padding: 2px 12px;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--sf-blue);
    border-radius: 4px;
  }

  /* ────────────────────────── Zones ────────────────────────── */
  .zones-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    position: relative;
  }

  .zone {
    background: var(--surface);
    border: 1.5px solid var(--zone-border, var(--border-subtle));
    border-radius: var(--radius-card);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    box-shadow: 0 1px 2px rgba(0,53,69,0.04);
  }
  .zone-stripe {
    height: 4px;
    background: var(--zone-stripe, var(--sf-blue));
  }
  .zone-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-subtle);
    background: var(--zone-header-bg, transparent);
    position: relative;
  }
  .zone-name {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--zone-color, var(--text-primary));
    line-height: 1.2;
  }
  .zone-tag {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .zone-body {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    flex: 1;
    align-content: start;
  }
  .zone-body.cols-2 { grid-template-columns: repeat(2, 1fr); min-width: 280px; }

  /* Compact node variant when inside a zone */
  .zone .flow-node {
    min-width: 0;
    width: 100%;
    padding: 16px 12px 14px;
    background: var(--surface-soft);
    border-radius: 8px;
    border: 1px solid var(--border-subtle);
    text-align: center;
    overflow: hidden;
  }
  .zone .flow-node .icon {
    width: clamp(28px, 60%, 44px);
    height: clamp(28px, 60%, 44px);
    padding: 6px;
    margin: 0 auto 6px;
  }
  .zone .flow-node .label {
    font-size: clamp(9px, 1.2vw, 12.5px);
    margin-bottom: 2px;
    overflow: hidden;
    /* Allow wrapping so labels in narrow sub-columns (intra-zone fan-out)
       aren't truncated mid-word. Cap at 2 lines with line-clamp so cards
       in adjacent zones still height-align reasonably. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-clamp: 2;
    white-space: normal;
    word-break: break-word;
  }
  .zone .flow-node .detail {
    font-size: clamp(8px, 1vw, 10.5px);
    line-height: 1.4;
    overflow: hidden;
    /* Allow up to 3 lines of detail text so descriptions don't get
       truncated by ellipsis in narrow sub-columns. */
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    line-clamp: 3;
    white-space: normal;
    word-break: break-word;
  }

  /* Per-category zone tinting */
  .zone.zone-onprem  {
    --zone-stripe: var(--sf-orange);
    --zone-color: #B86E1E;
    --zone-border: rgba(255,159,54,0.32);
    --zone-header-bg: rgba(255,159,54,0.05);
  }
  .zone.zone-bridge  {
    --zone-stripe: var(--sf-mid-blue);
    --zone-color: var(--sf-mid-blue);
    --zone-border: rgba(17,86,127,0.28);
    --zone-header-bg: rgba(17,86,127,0.05);
  }
  .zone.zone-snow    {
    --zone-stripe: var(--sf-blue);
    --zone-color: #1A8AB6;
    --zone-border: rgba(41,181,232,0.30);
    --zone-header-bg: rgba(41,181,232,0.05);
  }
  .zone.zone-outcome {
    --zone-stripe: var(--sf-star-blue);
    --zone-color: #2A9CA8;
    --zone-border: rgba(113,211,220,0.34);
    --zone-header-bg: rgba(113,211,220,0.06);
  }
  [data-theme="dark"] .zone.zone-onprem  { --zone-color: #FFB36A; }
  [data-theme="dark"] .zone.zone-bridge  { --zone-color: #6FB8E0; }
  [data-theme="dark"] .zone.zone-snow    { --zone-color: #5AC9F0; }
  [data-theme="dark"] .zone.zone-outcome { --zone-color: #88E0E8; }

  /* ────────────────────────── Flow row + nodes ────────────────────────── */
  .flow {
    display: flex;
    align-items: stretch;
    gap: 0;
    flex-wrap: nowrap;
    min-width: max-content;
  }

  .flow-node {
    /* Fixed minimum width prevents label wrapping into icon space */
    min-width: 200px;
    width: 200px;
    flex: 0 0 auto;
    padding: 20px 14px 18px;
    border-radius: var(--radius-node);
    background: var(--surface);
    border: 1.5px solid transparent;
    /* Plain block layout — children (icon, label, detail) stack as block elements
       at full content-area width. No flex on the card itself: flex would interact
       with explicit width:100% on the children and produce intrinsic widths. */
    display: block;
    transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    text-align: center;
  }
  .flow-node:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(0,53,69,0.12);
    z-index: 2;
  }

  .flow-node .icon {
    /* 64x64 circle, centered horizontally as a block */
    width: 64px;
    height: 64px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1.5px solid transparent;
    padding: 12px;
  }
  .flow-node .icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: var(--icon-filter, none);
  }
  [data-theme="dark"] .flow-node .icon img { filter: brightness(1.15); }

  .flow-node .label {
    display: block;
    margin-bottom: 4px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text-primary);
    text-align: center;
  }
  .flow-node .detail {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.45;
    text-align: center;
    word-break: normal;
    overflow-wrap: break-word;
  }

  /* Category styling */
  .node-onprem  { background: var(--node-onprem-bg); border-color: var(--node-onprem-border); }
  .node-onprem  .icon { background: var(--node-onprem-icon-bg); border-color: var(--node-onprem-icon-border); }
  .node-bridge  { background: var(--node-bridge-bg); border-color: var(--node-bridge-border); }
  .node-bridge  .icon { background: var(--node-bridge-icon-bg); border-color: var(--node-bridge-icon-border); }
  .node-snow    { background: var(--node-snow-bg); border-color: var(--node-snow-border); }
  .node-snow    .icon { background: var(--node-snow-icon-bg); border-color: var(--node-snow-icon-border); }
  .node-outcome { background: var(--node-outcome-bg); border-color: var(--node-outcome-border); }
  .node-outcome .icon { background: var(--node-outcome-icon-bg); border-color: var(--node-outcome-icon-border); }

  /* ────────────────────────── Animated connectors ────────────────────────── */
  .arrow-wrap {
    flex: 0 0 auto;
    width: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @keyframes flow-dash { to { stroke-dashoffset: -14; } }
  .flow-line { animation: flow-dash 1.4s linear infinite; }

  /* ────────────────────────── Citations panel ────────────────────────── */
  .citations {
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border-subtle);
    padding: 22px 24px;
    transition: background-color 0.25s ease, border-color 0.25s ease;
  }
  .citations h2 {
    font-size: 12px;
    color: var(--sf-blue);
    margin: 0 0 14px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .citation { padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
  .citation:last-child { border-bottom: none; }
  .citation a {
    color: var(--sf-blue);
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }
  .citation a:hover { text-decoration: underline; }
  .citation .excerpt {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    line-height: 1.5;
  }
  .citations-empty { color: var(--text-muted); font-style: italic; font-size: 13px; }

  /* ────────────────────────── Mermaid fallback ────────────────────────── */
  .mermaid-fallback {
    background: var(--surface);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border-subtle);
    padding: 22px 24px;
  }
  .mermaid-fallback pre {
    background: var(--surface-soft);
    padding: 12px;
    border-radius: 6px;
    font-size: 12px;
    overflow-x: auto;
  }

  footer {
    text-align: center;
    padding: 16px 0 36px;
    color: var(--text-muted);
    font-size: 11px;
  }
  footer code { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  .error {
    background: rgba(255,0,0,0.08);
    border: 1px solid rgba(255,0,0,0.25);
    color: #C62828;
    padding: 12px 16px;
    border-radius: 6px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    white-space: pre-wrap;
  }
  [data-theme="dark"] .error { color: #FFB4AB; background: rgba(255,80,80,0.10); }
</style>
</head>
<body>

<div class="header-band">
  <div class="header-inner">
    <div class="header-text">
      <h1 id="title">Snowflake Architecture Diagram</h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <div class="header-actions">
      <button id="btn-mmd">Download .mmd</button>
      <button id="btn-svg">Download .svg</button>
      <button id="btn-png">Download .png</button>
      <button id="btn-theme" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        <svg class="sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="page">

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-onprem"></div>External / On-Prem</div>
    <div class="legend-item"><div class="legend-dot dot-bridge"></div>Ingestion / Bridge</div>
    <div class="legend-item"><div class="legend-dot dot-snow"></div>Snowflake</div>
    <div class="legend-item"><div class="legend-dot dot-outcome"></div>Business Outcome</div>
  </div>

  <div class="diagram-card">
    <svg id="diagram-connectors" class="connector-overlay">
      <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L9,4 L1,7" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowhead-right" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="0" markerUnits="userSpaceOnUse">
      <path d="M1,1 L9,4 L1,7" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="180" markerUnits="userSpaceOnUse">
      <path d="M1,1 L9,4 L1,7" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
      </defs>
    </svg>
    <div class="flow" id="diagram-flow"></div>
    <div id="diagram-fallback" style="display:none;"></div>
  </div>

  <div class="citations">
    <h2>Documentation</h2>
    <div id="citations-list"><div class="citations-empty">No citations attached.</div></div>
  </div>

</div>

<footer>
  Source: <code id="source-tag">unknown</code> &nbsp;·&nbsp; snowflake-architecture-diagram skill
</footer>

<script src="lib/mermaid.min.js"></script>
<script src="lib/html-to-image.min.js"></script>
<script>
  // ────────────────────────────────────────────────────────
  // Theme handling
  // ────────────────────────────────────────────────────────
  const THEME_KEY = 'snowgram.theme';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch (_) { /* ignore */ }
  }
  (function bootTheme() {
    let theme = 'light';
    try { theme = localStorage.getItem(THEME_KEY) || 'light'; } catch (_) {}
    if (theme !== 'dark') {
      // Respect system preference for first-load only
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        try { if (!localStorage.getItem(THEME_KEY)) theme = 'dark'; } catch (_) {}
      }
    }
    applyTheme(theme);
  })();
  document.getElementById('btn-theme').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });

  // ────────────────────────────────────────────────────────
  // State loader
  // ────────────────────────────────────────────────────────
  async function loadState() {
    try {
      const r = await fetch('state.json', { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return await r.json();
    } catch (e) {
      return { title: 'No state.json', subtitle: '', source: 'fallback', nodes: [], edges: [], citations: [] };
    }
  }

  let currentState = null;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function arrowSvg() {
    return `<svg width="56" height="20" viewBox="0 0 56 20" fill="none">
      <line x1="2" y1="10" x2="40" y2="10"
            stroke="var(--connector-color)" stroke-width="1.5"
            stroke-dasharray="4 3" class="flow-line"/>
      <path d="M40 5l8 5-8 5"
            stroke="var(--connector-color)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`;
  }

  function renderFlow(state) {
    const flow = document.getElementById('diagram-flow');
    const fallback = document.getElementById('diagram-fallback');
    flow.innerHTML = '';
    fallback.style.display = 'none';

    const nodes = state.nodes || [];
    if (!nodes.length) {
      flow.style.display = 'none';
      if (state.mermaid) {
        fallback.style.display = 'block';
        fallback.innerHTML = '<div class="mermaid">' + escapeHtml(state.mermaid) + '</div>';
        try {
          mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
          mermaid.run({ nodes: fallback.querySelectorAll('.mermaid') });
        } catch (e) {
          fallback.innerHTML = '<div class="error">Mermaid error: ' + escapeHtml(e.message || e) + '</div>';
        }
      } else {
        fallback.style.display = 'block';
        fallback.innerHTML = '<div class="error">No nodes or Mermaid in state.json</div>';
      }
      return;
    }

    const nodesById = Object.fromEntries(nodes.map(n => [n.id, n]));
    const zones = Array.isArray(state.zones) ? state.zones : [];

    // ── Defensive backfill: if a zone has no node_ids[] but matching nodes
    // have node.zone === zone.name, populate node_ids from the nodes. This
    // lets hand-rolled state JSONs render correctly even when the producer
    // forgets to populate node_ids per zone.
    zones.forEach(function(z) {
      if (!Array.isArray(z.node_ids) || z.node_ids.length === 0) {
        z.node_ids = nodes
          .filter(function(n) { return n.zone === z.name; })
          .map(function(n) { return n.id; });
      }
    });

    // ── Enterprise zones layout (topology-driven columns) ──
    if (zones.length) {
      flow.className = 'arch-layout';
      flow.style.display = '';

      // --- Compute zone ranks from edge topology ---
      var nodeToZone = {};
      zones.forEach(function(z) {
        (z.node_ids || []).forEach(function(id) { nodeToZone[id] = z.name; });
      });

      // Build zone-level DAG
      var zoneNames = zones.map(function(z) { return z.name; });
      var zoneSuccessors = {};
      zoneNames.forEach(function(n) { zoneSuccessors[n] = []; });
      var edges = state.edges || [];
      edges.forEach(function(e) {
        var sz = nodeToZone[e.source], tz = nodeToZone[e.target];
        if (sz && tz && sz !== tz && zoneSuccessors[sz].indexOf(tz) === -1) {
          zoneSuccessors[sz].push(tz);
        }
      });

      // Longest-path rank assignment
      var rank = {};
      zoneNames.forEach(function(n) { rank[n] = 0; });
      var changed = true, safety = 0;
      while (changed && safety < 50) {
        changed = false; safety++;
        zoneNames.forEach(function(src) {
          zoneSuccessors[src].forEach(function(tgt) {
            if (rank[tgt] < rank[src] + 1) {
              rank[tgt] = rank[src] + 1;
              changed = true;
            }
          });
        });
      }

      // Group zones by rank
      var maxRank = 0;
      zoneNames.forEach(function(n) { if (rank[n] > maxRank) maxRank = rank[n]; });
      var columns = []; // columns[i] = [zone, zone, ...]
      for (var r = 0; r <= maxRank; r++) columns.push([]);
      zones.forEach(function(z) { columns[rank[z.name]].push(z); });

      // Set grid columns
      var colCount = maxRank + 1;
      flow.style.gridTemplateColumns = 'repeat(' + colCount + ', minmax(0, 1fr))';

      // Helper: build a zone DOM element. When the zone has intra-zone
      // fan-out (a node points to multiple siblings in the same zone), we
      // split the zone body into sub-columns so the source sits in its
      // own column to the LEFT of its targets — instead of stacking the
      // source on top of its targets where the connectors have to route
      // around them awkwardly.
      function buildZoneEl(z) {
        var cat = z.category || 'snow';
        var zoneEl = document.createElement('div');
        zoneEl.className = 'zone zone-' + cat;
        zoneEl.innerHTML = '<div class="zone-stripe"></div>' +
          '<div class="zone-header">' +
            '<div class="zone-name">' + escapeHtml(z.name) + '</div>' +
            '<div class="zone-tag">' + (z.node_ids || []).length + ' component' + ((z.node_ids || []).length === 1 ? '' : 's') + '</div>' +
          '</div>' +
          '<div class="zone-body"></div>';
        var body = zoneEl.querySelector('.zone-body');

        // Compute intra-zone topological column for each node.
        var nodeIds = z.node_ids || [];
        var nodeSet = {};
        nodeIds.forEach(function(id) { nodeSet[id] = true; });
        var intraEdges = (state.edges || []).filter(function(e) {
          return nodeSet[e.source] && nodeSet[e.target];
        });
        // Detect fan-out: a single node with >=2 intra-zone outgoing edges.
        var outDeg = {};
        intraEdges.forEach(function(e) {
          outDeg[e.source] = (outDeg[e.source] || 0) + 1;
        });
        var hasFanout = false;
        Object.keys(outDeg).forEach(function(k) { if (outDeg[k] >= 2) hasFanout = true; });

        // Topological column assignment via repeated relaxation.
        // col[id] = max(col[predecessor] + 1) over intra-zone predecessors.
        var col = {};
        nodeIds.forEach(function(id) { col[id] = 0; });
        if (hasFanout) {
          var maxIter = nodeIds.length + 2;
          var changed = true;
          while (changed && maxIter-- > 0) {
            changed = false;
            intraEdges.forEach(function(e) {
              var newCol = col[e.source] + 1;
              if (newCol > col[e.target]) {
                col[e.target] = newCol;
                changed = true;
              }
            });
          }
        }
        var maxCol = 0;
        nodeIds.forEach(function(id) { if (col[id] > maxCol) maxCol = col[id]; });

        // Per-column row index (preserves listed order within a column).
        var rowsPerCol = {};
        var nodeRow = {};
        nodeIds.forEach(function(id) {
          var c = col[id];
          if (rowsPerCol[c] === undefined) rowsPerCol[c] = 0;
          nodeRow[id] = rowsPerCol[c]++;
        });

        // Apply multi-column layout when fan-out is present.
        if (hasFanout && maxCol >= 1) {
          // Each sub-column needs a usable minimum width so card labels
          // and details don't truncate. 140px per column + 24px gaps.
          body.style.gridTemplateColumns = 'repeat(' + (maxCol + 1) + ', minmax(140px, 1fr))';
          body.style.columnGap = '24px';
          // Force the zone (and its parent rank column) to be wide enough
          // to accommodate all sub-columns without clipping. Padding 20px
          // each side + (maxCol+1) columns * 140 + maxCol * 24 gaps.
          var requiredMinWidth = (maxCol + 1) * 140 + maxCol * 24 + 40;
          body.style.minWidth = requiredMinWidth + 'px';
          zoneEl.style.minWidth = (requiredMinWidth + 16) + 'px';
          // Tag the zone-body so connector routing knows to expect
          // intra-zone cross-column edges.
          body.setAttribute('data-fanout', '1');
        }

        nodeIds.forEach(function(id) {
          var node = nodesById[id];
          if (!node) return;
          var div = document.createElement('div');
          div.className = 'flow-node node-' + (node.category || 'snow');
          div.setAttribute('data-node-id', node.id);
          div.setAttribute('data-zone-col', col[id]);
          if (hasFanout && maxCol >= 1) {
            div.style.gridColumn = (col[id] + 1);
            div.style.gridRow = (nodeRow[id] + 1);
          }
          var iconSrc = node.icon_data || ('icons/' + escapeHtml(node.icon));
          div.innerHTML = '<div class="icon"><img src="' + iconSrc + '" alt="" onerror="this.style.display=\'none\'"></div>' +
            '<div class="label">' + escapeHtml(node.label) + '</div>' +
            '<div class="detail">' + escapeHtml(node.detail || '') + '</div>';
          body.appendChild(div);
        });
        return zoneEl;
      }

      // Determine which columns are "inside Snowflake" (snow or outcome categories)
      var snowCols = {};
      columns.forEach(function(col, ci) {
        col.forEach(function(z) {
          if (z.category === 'snow' || z.category === 'outcome') snowCols[ci] = true;
        });
      });
      var snowColIndices = Object.keys(snowCols).map(Number).sort(function(a,b){return a-b;});
      var snowStart = snowColIndices.length ? snowColIndices[0] : -1;
      var snowEnd = snowColIndices.length ? snowColIndices[snowColIndices.length - 1] : -1;

      // Render columns
      columns.forEach(function(col, ci) {
        if (!col.length) return;

        var colEl = document.createElement('div');
        colEl.className = 'rank-column';

        // Wrap Snowflake columns in platform boundary (on first snow col)
        if (ci === snowStart && snowStart >= 0) {
          var boundary = document.createElement('div');
          boundary.className = 'platform-boundary';
          boundary.style.gridColumn = (snowStart + 1) + ' / ' + (snowEnd + 2);
          boundary.innerHTML = '<div class="platform-label">Snowflake Data Cloud</div>';
          var innerGrid = document.createElement('div');
          innerGrid.style.display = 'grid';
          // Use min-content as the lower bound so a zone that holds an
          // intra-zone fan-out (and therefore needs extra width to host
          // multiple sub-columns) can expand its track instead of being
          // clipped by 1fr's default min:0 sizing.
          innerGrid.style.gridTemplateColumns = 'repeat(' + (snowEnd - snowStart + 1) + ', minmax(min-content, 1fr))';
          innerGrid.style.gap = '48px';
          innerGrid.style.alignItems = 'start';
          innerGrid.style.overflow = 'hidden';

          // Render all snow columns inside the boundary
          for (var sci = snowStart; sci <= snowEnd; sci++) {
            var innerCol = document.createElement('div');
            innerCol.className = 'rank-column';
            columns[sci].forEach(function(z) { innerCol.appendChild(buildZoneEl(z)); });
            innerGrid.appendChild(innerCol);
          }
          boundary.appendChild(innerGrid);
          flow.appendChild(boundary);
          return; // Skip individual rendering for snow columns
        }
        // Skip columns already rendered inside boundary
        if (ci > snowStart && ci <= snowEnd) return;

        // External / non-snow columns render directly
        col.forEach(function(z) { colEl.appendChild(buildZoneEl(z)); });
        flow.appendChild(colEl);
      });

      // Draw connectors after layout settles
      setTimeout(function() { renderConnectors(state); }, 100);
      return;
    }

    // ── Fallback: flat horizontal flow (legacy) ─────────────────
    flow.className = 'flow';
    flow.style.display = 'flex';
    nodes.forEach((node, i) => {
      const div = document.createElement('div');
      div.className = 'flow-node node-' + (node.category || 'snow');
      div.innerHTML = `
        <div class="icon"><img src="icons/${escapeHtml(node.icon)}" alt="" onerror="this.src='icons/Snowflake_ICON_Architecture.svg'"></div>
        <div class="label">${escapeHtml(node.label)}</div>
        <div class="detail">${escapeHtml(node.detail || '')}</div>
      `;
      flow.appendChild(div);

      if (i < nodes.length - 1) {
        const arrow = document.createElement('div');
        arrow.className = 'arrow-wrap';
        arrow.innerHTML = arrowSvg();
        flow.appendChild(arrow);
      }
    });
  }

  // ────────────────────────────────────────────────────────
  // SVG Connector Rendering — orthogonal routing with deconfliction
  // ────────────────────────────────────────────────────────
  function renderConnectors(state) {
    const svg = document.getElementById('diagram-connectors');
    const card = document.querySelector('.diagram-card');
    if (!svg || !card) return;

    // Clear previous elements (keep <defs>)
    svg.querySelectorAll('.connector-group, .connector-path, .connector-dot').forEach(function(p) { p.remove(); });

    // Path data collected during edge routing for crossing detection
    var collectedPaths = [];

    const edges = state.edges || [];
    if (!edges.length) return;

    const cardRect = card.getBoundingClientRect();

    // Pre-pass: collect edges per zone-pair gap, sort by avgY for track assignment
    var gapEdges = {};   // "srcZoneName|tgtZoneName" → [{edgeIdx, avgY}]
    var gapIndex = {};   // edgeIdx → sorted index within its gap group
    var gapKey = {};     // edgeIdx → gap key string
    var gapCounts = {};  // gap key → total edges in that gap
    // Separate pool that ONLY counts V-needing edges (rowDiff >= 1).
    // L-shape and channel-track share this pool so their V columns are
    // distributed evenly across the gap and never collide at the same X.
    var vGapEdges = {};
    var vGapIndex = {};
    var vGapKey = {};
    var vGapCounts = {};
    // Per-node fan-in/fan-out for Y staggering
    var nodeOutCount = {};
    var nodeOutIdx = {};
    var nodeInCount = {};
    var nodeInIdx = {};
    function rowIdxOfPre(el) {
      var zoneEl = el.closest('.zone');
      if (!zoneEl) return -1;
      var nodes = zoneEl.querySelectorAll('.flow-node');
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i] === el) return i;
      }
      return -1;
    }
    edges.forEach(function(edge, idx) {
      var s = card.querySelector('[data-node-id="' + edge.source + '"]');
      var t = card.querySelector('[data-node-id="' + edge.target + '"]');
      if (!s || !t) return;
      var sz = s.closest('.zone'), tz = t.closest('.zone');
      if (!sz || !tz || sz === tz) return;
      var key = (sz.querySelector('.zone-name') || {}).textContent + '|' + (tz.querySelector('.zone-name') || {}).textContent;
      var srcCy = s.getBoundingClientRect().top + s.getBoundingClientRect().height / 2;
      var tgtCy = t.getBoundingClientRect().top + t.getBoundingClientRect().height / 2;
      if (!gapEdges[key]) gapEdges[key] = [];
      gapEdges[key].push({ idx: idx, avgY: (srcCy + tgtCy) / 2 });
      gapKey[idx] = key;
      // V-needing pool: only edges that will produce a vertical column
      // (different rows in their respective zones).
      var srcRowIdx = rowIdxOfPre(s);
      var tgtRowIdx = rowIdxOfPre(t);
      var rowDiff = (srcRowIdx >= 0 && tgtRowIdx >= 0)
        ? Math.abs(srcRowIdx - tgtRowIdx)
        : 0;
      if (rowDiff >= 1) {
        if (!vGapEdges[key]) vGapEdges[key] = [];
        vGapEdges[key].push({
          idx: idx,
          avgY: (srcCy + tgtCy) / 2,
          srcY: srcCy,
          tgtY: tgtCy
        });
        vGapKey[idx] = key;
      }
      // Fan-out tracking
      if (!nodeOutCount[edge.source]) nodeOutCount[edge.source] = 0;
      nodeOutIdx[idx] = nodeOutCount[edge.source];
      nodeOutCount[edge.source]++;
      // Fan-in tracking
      if (!nodeInCount[edge.target]) nodeInCount[edge.target] = 0;
      nodeInIdx[idx] = nodeInCount[edge.target];
      nodeInCount[edge.target]++;
    });
    // Sort each gap's edges by avgY (top-to-bottom) and assign track indices
    Object.keys(gapEdges).forEach(function(key) {
      var group = gapEdges[key];
      group.sort(function(a, b) { return a.avgY - b.avgY; });
      gapCounts[key] = group.length;
      group.forEach(function(item, sortedIdx) {
        gapIndex[item.idx] = sortedIdx;
      });
    });
    Object.keys(vGapEdges).forEach(function(key) {
      var group = vGapEdges[key];
      // Sort with corner-proximity awareness so we avoid the visual
      // "stairstep" pattern where one connector's terminal H ends near
      // another connector's source H. Each L-shape has two corners:
      //   - source corner: H points LEFT (toward x1)  ─── "Left H"
      //   - terminal corner: H points RIGHT (toward x2) ─── "Right H"
      // When a Right-H corner of A is close in Y to a Left-H corner of
      // B, the two H stubs would overlap in X range, looking like a
      // single zigzag path. To prevent overlap we want A's stubX > B's
      // stubX (Right-H connector turns AFTER Left-H connector), so
      // their H stubs land in disjoint X ranges.
      // Falls back to avgY ascending when no close-corner pair exists.
      var Y_THRESHOLD = 30;
      group.sort(function(a, b) {
        // a's terminal corner (Right-H) close to b's source corner (Left-H)
        // → a should turn AFTER b (a.stubX > b.stubX → larger idx)
        if (Math.abs(a.tgtY - b.srcY) < Y_THRESHOLD) return 1;
        // a's source corner (Left-H) close to b's terminal corner (Right-H)
        // → a should turn BEFORE b (a.stubX < b.stubX → smaller idx)
        if (Math.abs(a.srcY - b.tgtY) < Y_THRESHOLD) return -1;
        return a.avgY - b.avgY;
      });
      vGapCounts[key] = group.length;
      group.forEach(function(item, sortedIdx) {
        vGapIndex[item.idx] = sortedIdx;
      });
    });

    edges.forEach(function(edge, edgeIdx) {
      const srcEl = card.querySelector('[data-node-id="' + edge.source + '"]');
      const tgtEl = card.querySelector('[data-node-id="' + edge.target + '"]');
      if (!srcEl || !tgtEl) return;

      const srcZone = srcEl.closest('.zone');
      const tgtZone = tgtEl.closest('.zone');
      const sameZone = srcZone && tgtZone && srcZone === tgtZone;

      var x1, y1, x2, y2, d;
      var useFixedArrow = false;  // true → use direction-locked marker
      var arrowDir = 'right';     // 'right' or 'left' for fixed-orientation arrows

      if (sameZone) {
        // Within-zone routing.
        // First check intra-zone column position. When the zone uses
        // sub-columns (intra-zone fan-out detected), edges between nodes
        // in DIFFERENT sub-columns must route HORIZONTALLY (not vertically).
        var srcCol = parseInt(srcEl.getAttribute('data-zone-col') || '0', 10);
        var tgtCol = parseInt(tgtEl.getAttribute('data-zone-col') || '0', 10);
        const srcRect = srcEl.getBoundingClientRect();
        const tgtRect = tgtEl.getBoundingClientRect();

        if (srcCol !== tgtCol) {
          // Intra-zone cross-column — horizontal H-V-H routing.
          // Source exits its right edge at center y; target receives at
          // its left edge at center y. A vertical bend in the gap between
          // columns handles row offset.
          var dirRight = (tgtCol > srcCol);
          if (dirRight) {
            x1 = srcRect.right - cardRect.left;
            x2 = tgtRect.left - cardRect.left;
          } else {
            x1 = srcRect.left - cardRect.left;
            x2 = tgtRect.right - cardRect.left;
          }
          y1 = (srcRect.top + srcRect.height / 2) - cardRect.top;
          y2 = (tgtRect.top + tgtRect.height / 2) - cardRect.top;
          // Bias the V-segment toward the SOURCE side so the L-turn
          // happens shortly after the line exits the source — instead
          // of approaching the target's left edge before turning, which
          // visually crowds the target. 28-44px past the source's right
          // edge, staggered per edge to avoid overlapping V segments.
          var midX;
          if (dirRight) {
            midX = x1 + 28 + (edgeIdx % 4) * 5;
            if (midX > x2 - 18) midX = x2 - 18; // safety: keep clear of target
          } else {
            midX = x1 - 28 - (edgeIdx % 4) * 5;
            if (midX < x2 + 18) midX = x2 + 18;
          }
          if (Math.abs(y2 - y1) < 1) {
            // Same row — straight horizontal.
            d = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
          } else {
            d = 'M' + x1 + ',' + y1 +
                ' L' + midX + ',' + y1 +
                ' L' + midX + ',' + y2 +
                ' L' + x2 + ',' + y2;
          }
          useFixedArrow = true;
          arrowDir = dirRight ? 'right' : 'left';
        } else {
          // Same sub-column — vertical routing logic.
          // Adjacent rows within a column = clean vertical line. Non-adjacent
          // = side-channel detour with side entry into target's right edge
          // (so it cannot be confused with an adjacent vertical edge).
        x1 = srcRect.left + srcRect.width / 2 - cardRect.left;
        y1 = srcRect.bottom - cardRect.top;
        x2 = tgtRect.left + tgtRect.width / 2 - cardRect.left;
        y2 = tgtRect.top - cardRect.top;

        // Compute row indices of src and tgt within the shared zone.
          // Restrict to nodes in the SAME sub-column for accurate row indexing.
          var sameColNodes = Array.prototype.filter.call(
            srcZone.querySelectorAll('.flow-node'),
            function(el) { return parseInt(el.getAttribute('data-zone-col') || '0', 10) === srcCol; }
          );
        var srcRow = -1, tgtRow = -1;
          for (var zi = 0; zi < sameColNodes.length; zi++) {
            if (sameColNodes[zi] === srcEl) srcRow = zi;
            if (sameColNodes[zi] === tgtEl) tgtRow = zi;
        }
        var rowGap = (srcRow >= 0 && tgtRow >= 0) ? Math.abs(tgtRow - srcRow) : 1;
        var goingDownward = (srcRow >= 0 && tgtRow >= 0) ? (tgtRow > srcRow) : (y2 > y1);

        if (rowGap <= 1) {
          d = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
        } else {
          var nextRow = goingDownward ? srcRow + 1 : srcRow - 1;
            var nextEl = (nextRow >= 0 && nextRow < sameColNodes.length) ? sameColNodes[nextRow] : null;
          var stubBendY;
          if (nextEl) {
            var nextRect = nextEl.getBoundingClientRect();
            if (goingDownward) {
              stubBendY = (y1 + (nextRect.top - cardRect.top)) / 2;
            } else {
              stubBendY = (y1 + (nextRect.bottom - cardRect.top)) / 2;
            }
          } else {
            stubBendY = goingDownward ? y1 + 14 : y1 - 14;
          }

          var nodeRightEdge = srcRect.right - cardRect.left;
          var sideOffset = 14 + (edgeIdx % 3) * 6;
          var sideX = nodeRightEdge + sideOffset;

          var tgtRightEdge = tgtRect.right - cardRect.left;
          var tgtCenterY = (tgtRect.top + tgtRect.height / 2) - cardRect.top;

          d = 'M' + x1 + ',' + y1 +
              ' L' + x1 + ',' + stubBendY +
              ' L' + sideX + ',' + stubBendY +
              ' L' + sideX + ',' + tgtCenterY +
              ' L' + tgtRightEdge + ',' + tgtCenterY;

          useFixedArrow = true;
          arrowDir = 'left';
          }
        }
      } else {
        // Cross-zone: channel-track orthogonal routing
        const srcZoneRect = srcZone.getBoundingClientRect();
        const tgtZoneRect = tgtZone.getBoundingClientRect();
        const srcRect = srcEl.getBoundingClientRect();
        const tgtRect = tgtEl.getBoundingClientRect();

        var srcNodeCy = srcRect.top + srcRect.height / 2 - cardRect.top;
        var tgtNodeCy = tgtRect.top + tgtRect.height / 2 - cardRect.top;
        var srcZoneCx = srcZoneRect.left + srcZoneRect.width / 2 - cardRect.left;
        var tgtZoneCx = tgtZoneRect.left + tgtZoneRect.width / 2 - cardRect.left;

        var horizontalGap = (tgtZoneRect.left > srcZoneRect.right) || (srcZoneRect.left > tgtZoneRect.right);
        var verticalGap = (tgtZoneRect.top > srcZoneRect.bottom) || (srcZoneRect.top > tgtZoneRect.bottom);
        var useHorizontal = horizontalGap || (!verticalGap && Math.abs(tgtZoneCx - srcZoneCx) > 20);

        var edgeMargin = 8;

        if (useHorizontal) {
          var dx = tgtZoneCx - srcZoneCx;
          if (dx >= 0) {
            x1 = srcRect.right - cardRect.left + edgeMargin;
            x2 = tgtRect.left - cardRect.left - edgeMargin;
          } else {
            x1 = srcRect.left - cardRect.left - edgeMargin;
            x2 = tgtRect.right - cardRect.left + edgeMargin;
          }
          // Y stagger for fan-in/fan-out at same node
          var srcOutTotal = nodeOutCount[edge.source] || 1;
          var srcOutI = nodeOutIdx[edgeIdx] !== undefined ? nodeOutIdx[edgeIdx] : 0;
          var tgtInTotal = nodeInCount[edge.target] || 1;
          var tgtInI = nodeInIdx[edgeIdx] !== undefined ? nodeInIdx[edgeIdx] : 0;
          // Y stagger: separate fan-out/fan-in edges so parallel lines
          // don't visually layer on top of each other. 16px per step
          // gives clear visual separation between adjacent lanes.
          var srcYStagger = srcOutTotal > 1 ? (srcOutI - (srcOutTotal - 1) / 2) * 16 : 0;
          var tgtYStagger = tgtInTotal > 1 ? (tgtInI - (tgtInTotal - 1) / 2) * 16 : 0;
          y1 = srcNodeCy + srcYStagger;
          y2 = tgtNodeCy + tgtYStagger;

          if (dx >= 0 && x2 <= x1) x2 = x1 + 16;
          if (dx < 0 && x2 >= x1) x2 = x1 - 16;

          var vDist = Math.abs(y2 - y1);
          arrowDir = (dx >= 0) ? 'right' : 'left';

          // Compute row index of source/target within their zones.
          // Using row INDEX rather than absolute Y distance reliably
          // identifies "same row" connections even when zones have
          // different node counts (and thus different row spacing).
          function rowIdxOf(el) {
            var zoneEl = el.closest('.zone');
            if (!zoneEl) return -1;
            var nodes = zoneEl.querySelectorAll('.flow-node');
            for (var i = 0; i < nodes.length; i++) {
              if (nodes[i] === el) return i;
            }
            return -1;
          }
          var srcRowIdx = rowIdxOf(srcEl);
          var tgtRowIdx = rowIdxOf(tgtEl);
          var rowDiff = (srcRowIdx >= 0 && tgtRowIdx >= 0)
            ? Math.abs(srcRowIdx - tgtRowIdx)
            : 999;

          if (rowDiff === 0) {
            // Same row — snap to common Y for true horizontal line.
            // Avoids tiny V kinks when zones have slight Y misalignment.
            var commonY = (y1 + y2) / 2;
            d = 'M' + x1 + ',' + commonY + ' L' + x2 + ',' + commonY;
          } else if (rowDiff === 1) {
            // Adjacent rows — H→V→H L-shape, with V column distributed
            // across the gap based on the V-needing edge index. This
            // prevents two V columns in the same gap from landing at
            // the same X. Channel-track uses the same pool so L-shapes
            // and 2+row tracks coordinate.
            // Use (idx+1)/(N+1) formula which keeps Vs in the central
            // portion of the gap — this avoids the extreme positions
            // (one V hugging the source zone edge, one hugging the
            // target zone edge) that come with the edge-anchored
            // idx/(N-1) variant.
            var vKey = vGapKey[edgeIdx];
            var vTotal = vKey ? (vGapCounts[vKey] || 1) : 1;
            var vIdx = vGapIndex[edgeIdx] !== undefined ? vGapIndex[edgeIdx] : 0;
            var stubMinX = Math.min(x1, x2) + 4;
            var stubMaxX = Math.max(x1, x2) - 4;
            var stubX;
            if (stubMaxX > stubMinX) {
              stubX = stubMinX + (stubMaxX - stubMinX) * (vIdx + 1) / (vTotal + 1);
            } else {
              stubX = (x1 + x2) / 2;
            }
            d = 'M' + x1 + ',' + y1 +
                ' L' + stubX + ',' + y1 +
                ' L' + stubX + ',' + y2 +
                ' L' + x2 + ',' + y2;
          } else {
            // 2+ rows apart — channel-track H→V→H.
            // Shares the V-needing stagger pool with L-shape.
            var vKey2 = vGapKey[edgeIdx];
            var vTotal2 = vKey2 ? (vGapCounts[vKey2] || 1) : 1;
            var vIdx2 = vGapIndex[edgeIdx] !== undefined ? vGapIndex[edgeIdx] : 0;
            var trackMinX = Math.min(x1, x2) + 4;
            var trackMaxX = Math.max(x1, x2) - 4;
            var trackX;
            if (trackMaxX > trackMinX) {
              trackX = trackMinX + (trackMaxX - trackMinX) * (vIdx2 + 1) / (vTotal2 + 1);
            } else {
              trackX = (x1 + x2) / 2;
            }
            d = 'M' + x1 + ',' + y1 +
                ' L' + trackX + ',' + y1 +
                ' L' + trackX + ',' + y2 +
                ' L' + x2 + ',' + y2;
          }
        } else {
          // Vertical: exit bottom/top using node centers for X
          var dy = tgtNodeCy - srcNodeCy;
          if (dy >= 0) {
            y1 = srcZoneRect.bottom - cardRect.top + edgeMargin;
            y2 = tgtZoneRect.top - cardRect.top - edgeMargin;
          } else {
            y1 = srcZoneRect.top - cardRect.top - edgeMargin;
            y2 = tgtZoneRect.bottom - cardRect.top + edgeMargin;
          }
          x1 = srcRect.left + srcRect.width / 2 - cardRect.left;
          x2 = tgtRect.left + tgtRect.width / 2 - cardRect.left;

          if (dy >= 0 && y2 <= y1) y2 = y1 + 16;
          if (dy < 0 && y2 >= y1) y2 = y1 - 16;

          // V→H→V with track from gap geometry
          var vGapTop = (dy >= 0 ? srcZoneRect.bottom : tgtZoneRect.bottom) - cardRect.top;
          var vGapBot = (dy >= 0 ? tgtZoneRect.top : srcZoneRect.top) - cardRect.top;
          var vGapHeight = vGapBot - vGapTop;
          var eKey = gapKey[edgeIdx];
          var total = eKey ? (gapCounts[eKey] || 1) : 1;
          var idx = gapIndex[edgeIdx] !== undefined ? gapIndex[edgeIdx] : 0;
          var turnY = vGapTop + vGapHeight * (idx + 1) / (total + 1);
          d = 'M' + x1 + ',' + y1 +
              ' L' + x1 + ',' + turnY +
              ' L' + x2 + ',' + turnY +
              ' L' + x2 + ',' + y2;
        }
      }

      const markerId = useFixedArrow
        ? (arrowDir === 'left' ? 'arrowhead-left' : 'arrowhead-right')
        : 'arrowhead';
      // Defer rendering: collect path data first so we can detect
      // V-H crossings between paths and render line jumps (arcs).
      collectedPaths.push({ d: d, markerId: markerId, source: edge.source, target: edge.target });
    });

    // ── Phase 2: detect V-H crossings between paths ──
    // Parse each "M x,y L x,y L ..." into a points array.
    function parsePath(d) {
      var pts = [];
      d.split(/[ML]\s*/).forEach(function(seg) {
        seg = seg.trim();
        if (!seg) return;
        var parts = seg.split(',');
        if (parts.length === 2) {
          pts.push([parseFloat(parts[0]), parseFloat(parts[1])]);
        }
      });
      return pts;
    }
    collectedPaths.forEach(function(p) {
      p.points = parsePath(p.d);
      p.bumps = [];  // [{ segIdx, y }] for V segments that need to arc over crossings
    });
    // For each V segment in path A, find each H segment in path B (B != A)
    // that crosses it. Mark a bump at the crossing Y on the V.
    for (var i = 0; i < collectedPaths.length; i++) {
      var A = collectedPaths[i];
      for (var sa = 0; sa < A.points.length - 1; sa++) {
        var a1 = A.points[sa], a2 = A.points[sa + 1];
        if (Math.abs(a1[0] - a2[0]) > 0.5) continue; // not vertical
        var vx = a1[0];
        var vyMin = Math.min(a1[1], a2[1]);
        var vyMax = Math.max(a1[1], a2[1]);
        for (var j = 0; j < collectedPaths.length; j++) {
          if (j === i) continue;
          var B = collectedPaths[j];
          for (var sb = 0; sb < B.points.length - 1; sb++) {
            var b1 = B.points[sb], b2 = B.points[sb + 1];
            if (Math.abs(b1[1] - b2[1]) > 0.5) continue; // not horizontal
            var hy = b1[1];
            var hxMin = Math.min(b1[0], b2[0]);
            var hxMax = Math.max(b1[0], b2[0]);
            // Crossing if V's X is strictly inside H's X range AND H's Y
            // is strictly inside V's Y range. Use small margin to avoid
            // bumping at shared endpoints (corners).
            if (vx > hxMin + 1 && vx < hxMax - 1 &&
                hy > vyMin + 1 && hy < vyMax - 1) {
              A.bumps.push({ segIdx: sa, y: hy });
            }
          }
        }
      }
    }

    // ── Phase 3: build SVG path strings with arcs at bumps ──
    function buildPathD(points, bumps) {
      var d = 'M' + points[0][0] + ',' + points[0][1];
      var r = 5; // arc radius for line jumps
      for (var s = 0; s < points.length - 1; s++) {
        var p1 = points[s], p2 = points[s + 1];
        var segBumps = bumps
          .filter(function(b) { return b.segIdx === s; })
          .map(function(b) { return b.y; });
        // V segment with bumps: insert arcs at each crossing
        if (Math.abs(p1[0] - p2[0]) < 0.5 && segBumps.length > 0) {
          var goingDown = p2[1] > p1[1];
          // Sort bumps in order of travel along the V
          segBumps.sort(function(a, b) { return goingDown ? a - b : b - a; });
          var x = p1[0];
          var sweep = goingDown ? 1 : 0; // bump to the RIGHT of travel direction
          segBumps.forEach(function(by) {
            var beforeY = goingDown ? by - r : by + r;
            var afterY = goingDown ? by + r : by - r;
            d += ' L' + x + ',' + beforeY;
            d += ' A' + r + ',' + r + ' 0 0 ' + sweep + ' ' + x + ',' + afterY;
          });
          d += ' L' + p2[0] + ',' + p2[1];
        } else {
          d += ' L' + p2[0] + ',' + p2[1];
        }
      }
      return d;
    }

    // ── Phase 4: render each connector as a hit-area + visible path group ──
    collectedPaths.forEach(function(p) {
      var finalD = buildPathD(p.points, p.bumps);
      var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'connector-group');
      // Stamp source/target IDs so node hover can find related connectors
      // and connector hover can highlight the right endpoint nodes.
      if (p.source) g.setAttribute('data-source-id', p.source);
      if (p.target) g.setAttribute('data-target-id', p.target);

      var hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hit.setAttribute('d', finalD);
      hit.setAttribute('class', 'connector-hit');
      g.appendChild(hit);

      var pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      pathEl.setAttribute('d', finalD);
      pathEl.setAttribute('class', 'connector-path');
      pathEl.setAttribute('marker-end', 'url(#' + p.markerId + ')');
      g.appendChild(pathEl);

      svg.appendChild(g);
    });

    // ── Connectivity hover wireup ──
    // Hovering any connector or any node highlights the line, its
    // arrow (via context-stroke on the marker), the source node, and
    // the target node together.
    function activateConnector(group) {
      group.classList.add('is-active');
      var srcId = group.getAttribute('data-source-id');
      var tgtId = group.getAttribute('data-target-id');
      if (srcId) {
        var srcEl = card.querySelector('[data-node-id="' + srcId + '"]');
        if (srcEl) srcEl.classList.add('is-active');
      }
      if (tgtId) {
        var tgtEl = card.querySelector('[data-node-id="' + tgtId + '"]');
        if (tgtEl) tgtEl.classList.add('is-active');
      }
    }
    function deactivateConnector(group) {
      group.classList.remove('is-active');
      var srcId = group.getAttribute('data-source-id');
      var tgtId = group.getAttribute('data-target-id');
      if (srcId) {
        var srcEl = card.querySelector('[data-node-id="' + srcId + '"]');
        if (srcEl) srcEl.classList.remove('is-active');
      }
      if (tgtId) {
        var tgtEl = card.querySelector('[data-node-id="' + tgtId + '"]');
        if (tgtEl) tgtEl.classList.remove('is-active');
      }
    }
    svg.querySelectorAll('.connector-group').forEach(function(group) {
      group.addEventListener('mouseenter', function() { activateConnector(group); });
      group.addEventListener('mouseleave', function() { deactivateConnector(group); });
    });
    // Hovering a node activates every connector incident to it (and
    // therefore the connector's other endpoint too).
    card.querySelectorAll('.flow-node[data-node-id]').forEach(function(nodeEl) {
      var nodeId = nodeEl.getAttribute('data-node-id');
      if (!nodeId) return;
      // Remove any previous listeners by cloning the node — actually
      // simpler: rely on a single attached handler per render. Since
      // renderConnectors is called on resize, we attach fresh each
      // time but the previous listeners stay attached on the same
      // element. Use a flag to avoid double-binding.
      if (nodeEl.__connHover) return;
      nodeEl.__connHover = true;
      nodeEl.addEventListener('mouseenter', function() {
        var groups = svg.querySelectorAll(
          '.connector-group[data-source-id="' + nodeId + '"], ' +
          '.connector-group[data-target-id="' + nodeId + '"]'
        );
        groups.forEach(activateConnector);
      });
      nodeEl.addEventListener('mouseleave', function() {
        var groups = svg.querySelectorAll(
          '.connector-group[data-source-id="' + nodeId + '"], ' +
          '.connector-group[data-target-id="' + nodeId + '"]'
        );
        groups.forEach(deactivateConnector);
      });
    });
  }

  // Re-draw connectors on resize (debounced for smooth response)
  (function() {
    var resizeTimer = null;
    function debouncedRedraw() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        if (currentState && currentState.zones && currentState.zones.length) {
          renderConnectors(currentState);
        }
      }, 50);
    }
    var ro = new ResizeObserver(debouncedRedraw);
    ro.observe(document.querySelector('.diagram-card'));
    window.addEventListener('resize', debouncedRedraw);
  })();

  function renderCitations(citations) {
    const list = document.getElementById('citations-list');
    if (!citations || !citations.length) {
      list.innerHTML = '<div class="citations-empty">No citations attached.</div>';
      return;
    }
    list.innerHTML = citations.map(c => `
      <div class="citation">
        <a href="${escapeHtml(c.url)}" target="_blank" rel="noopener">${escapeHtml(c.title || c.url)}</a>
        ${c.excerpt ? `<div class="excerpt">${escapeHtml(c.excerpt)}</div>` : ''}
      </div>
    `).join('');
  }

  function render(state) {
    currentState = state;
    document.getElementById('title').textContent = state.title || 'Snowflake Architecture Diagram';
    document.getElementById('subtitle').textContent = state.subtitle || '';
    document.getElementById('source-tag').textContent = state.source || 'unknown';
    renderFlow(state);
    renderCitations(state.citations);
  }

  // ────────────────────────────────────────────────────────
  // Downloads
  // ────────────────────────────────────────────────────────
  function safeName() {
    return ((currentState && currentState.title) || 'diagram').replace(/[^a-z0-9_-]+/gi, '_');
  }
  function download(filename, blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    a.remove(); setTimeout(() => URL.revokeObjectURL(url), 100);
  }
  document.getElementById('btn-mmd').addEventListener('click', () => {
    const m = (currentState && currentState.mermaid) || '';
    if (!m) return alert('No Mermaid attached. Skill writes mermaid alongside nodes for export.');
    download(safeName() + '.mmd', new Blob([m], { type: 'text/plain;charset=utf-8' }));
  });
  document.getElementById('btn-svg').addEventListener('click', async () => {
    const target = document.querySelector('.diagram-card');
    try {
      const dataUrl = await htmlToImage.toSvg(target);
      const blob = await fetch(dataUrl).then(r => r.blob());
      download(safeName() + '.svg', blob);
    } catch (e) { alert('SVG export failed: ' + (e.message || e)); }
  });
  document.getElementById('btn-png').addEventListener('click', async () => {
    const target = document.querySelector('.diagram-card');
    try {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const dataUrl = await htmlToImage.toPng(target, {
        backgroundColor: isDark ? '#1B252E' : '#FFFFFF',
        pixelRatio: 2,
      });
      const a = document.createElement('a');
      a.download = safeName() + '.png'; a.href = dataUrl; a.click();
    } catch (e) { alert('PNG export failed: ' + (e.message || e)); }
  });

  // Boot
  loadState().then(render);
</script>
</body>
</html>
